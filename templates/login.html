{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block layout %}
<div class="flex items-center justify-center min-h-screen bg-base-100">
  <div class="w-full max-w-xs">
    <div class="border border-base-300/70 rounded-xl bg-base-100 p-7 shadow-sm">
      <h2 class="text-lg font-bold text-center mb-6">Cafetera HR Admin</h2>

      {% if error %}
      <div class="alert alert-error text-sm mb-4 rounded-lg">
        <span>
          {% if error == "invalid_key" %}
            Неверный ключ доступа.
          {% else %}
            Ошибка авторизации.
          {% endif %}
        </span>
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="form-control mb-5">
          <label class="text-sm font-medium text-base-content/70 mb-1.5" for="api_key">
            Ключ доступа
          </label>
          <input
            type="password"
            id="api_key"
            name="api_key"
            placeholder="Введите ключ"
            class="input input-sm input-bordered w-full rounded-lg"
            required
            autofocus
          />
        </div>
        <button type="submit" class="btn btn-sm btn-primary w-full rounded-lg">Войти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
