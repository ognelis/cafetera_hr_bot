[project]
name = "app"
version = "0.1.0"
description = "RAG bot backend with FastAPI, LangChain, Qdrant, Telegram and VK integrations"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "hypercorn>=0.18.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "httpx>=0.27.0",
  "langchain>=0.3.0",
  "langchain-text-splitters>=0.3.0",
  "langchain-qdrant>=0.2.1",
  "qdrant-client>=1.10.0",
  "aiogram>=3.26.0",
  "vkbottle>=4.7.0",
  "python-docx>=1.1.0",
  "docx2txt>=0.8",
  "aiosqlite>=0.20.0",
  "aiobotocore>=2.13.0",
  "jinja2>=3.1.0",
  "python-multipart>=0.0.9",
  "pytest>=8.3.0",
  "pytest-asyncio>=0.24.0",
  "tiktoken>=0.12.0",
]

[project.optional-dependencies]
ollama = [
  "langchain-ollama>=0.2.0"
]

openai_compatible = [
  "langchain-openai>=0.2.0"
]

dev = [
  "ruff>=0.6.0",
  "mypy>=1.11.0"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
disallow_untyped_defs = false
