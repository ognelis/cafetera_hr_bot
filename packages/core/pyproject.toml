[project]
name = "cafetera-core"
version = "0.1.0"
description = "Core domain logic, RAG pipeline, and storage for Cafetera HR Bot"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "httpx>=0.28.1",
    "langchain>=0.3.0",
    "langchain-text-splitters>=1.1.1",
    "langchain-qdrant>=1.1.0",
    "langchain-experimental>=0.4.1",
    "langchain-ollama>=1.1.0",
    "langchain-openai>=1.1.12",
    "qdrant-client>=1.17.1",
    "fastembed>=0.8.0",
    "databases[asyncpg]>=0.9.0",
    "aiobotocore>=2.26.0",
    "python-docx>=1.2.0",
    "openpyxl>=3.1.5",
    "sharepoint-to-text>=1.1.1",
    "tiktoken>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
