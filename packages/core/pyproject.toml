[project]
name = "cafetera-core"
version = "0.1.0"
description = "Core domain logic and storage for Cafetera HR Bot"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pydantic",
    "pydantic-settings",
    "databases[asyncpg]",
    "aiobotocore",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"