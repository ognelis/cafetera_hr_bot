[project]
name = "cafetera-admin"
version = "0.1.0"
description = "Admin web UI (FastAPI + HTMX) for Cafetera HR Bot"
requires-python = ">=3.13,<3.14"
dependencies = [
    "cafetera-core",
    "fastapi",
    "hypercorn",
    "jinja2",
    "python-multipart",
]

[tool.uv.sources]
cafetera-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"