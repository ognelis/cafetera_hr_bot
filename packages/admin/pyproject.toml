[project]
name = "cafetera-admin"
version = "0.1.0"
description = "Admin web UI (FastAPI + HTMX) for Cafetera HR Bot"
requires-python = ">=3.13,<3.14"
dependencies = [
    "cafetera-core",
    "fastapi>=0.136.1",
    "hypercorn>=0.18.0",
    "jinja2>=3.1.6",
    "python-multipart>=0.0.26",
    "langchain-docling>=2.0.0",
    "docling>=2.91.0",
    "docling-onnx-models>=0.1.3",
    "opencv-python-headless>=4.5.0",
    "torch>=2.2.2,<3",
    "torchvision>=0.17,<1",
]

[tool.uv.sources]
cafetera-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"