services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-bot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  qdrant_storage:
