services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-bot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"HTTP/1.1 200\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio
    container_name: rag-bot-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: rag-bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cafetera
      POSTGRES_PASSWORD: cafetera
      POSTGRES_DB: cafetera
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafetera -d cafetera"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        RERANKER_MODEL: ${RERANKER_MODEL:-jinaai/jina-reranker-v2-base-multilingual}
        CHUNKER_TOKENIZER_MODEL: ${CHUNKER_TOKENIZER_MODEL:-Qwen/Qwen3-Embedding-0.6B}
    container_name: rag-bot-admin
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      BIND_HOST: "0.0.0.0"
      # Override localhost URLs with Docker service names
      DATABASE_URL: "postgresql://cafetera:cafetera@postgres:5432/cafetera"
      QDRANT_URL: "http://qdrant:6333"
      S3_ENDPOINT_URL: "http://minio:9000"
      # Ollama/LLM on host machine — use host.docker.internal instead of localhost
      LLM_BASE_URL: "http://host.docker.internal:11434"
      EMBEDDING_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  vk_bot:
    build:
      context: .
      dockerfile: Dockerfile.polling_vk
      args:
        RERANKER_MODEL: ${RERANKER_MODEL:-jinaai/jina-reranker-v2-base-multilingual}
    container_name: rag-bot-vk
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override localhost URLs with Docker service names
      DATABASE_URL: "postgresql://cafetera:cafetera@postgres:5432/cafetera"
      QDRANT_URL: "http://qdrant:6333"
      S3_ENDPOINT_URL: "http://minio:9000"
      # Ollama/LLM on host machine — use host.docker.internal instead of localhost
      LLM_BASE_URL: "http://host.docker.internal:11434"
      EMBEDDING_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  qdrant_storage:
  minio_data:
  pg_data:
